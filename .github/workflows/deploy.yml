name: Deploy LMS API

on:
push:
branches:
- main
workflow_dispatch:

jobs:
deploy:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup .NET 8
    uses: actions/setup-dotnet@v4
    with:
      dotnet-version: '8.0.x'

  - name: Restore
    run: dotnet restore LMS.API/LMS.API.csproj

  - name: Publish
    run: dotnet publish LMS.API/LMS.API.csproj -c Release -o publish

  - name: Prepare Server Folder
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.SERVER_HOST }}
      username: ${{ secrets.SERVER_USER }}
      key: ${{ secrets.SERVER_SSH_KEY }}
      script: |
        mkdir -p /var/www/LMS-API
        rm -rf /var/www/LMS-API/publish_new
        mkdir -p /var/www/LMS-API/publish_new

  - name: Upload Files
    uses: appleboy/scp-action@v0.1.7
    with:
      host: ${{ secrets.SERVER_HOST }}
      username: ${{ secrets.SERVER_USER }}
      key: ${{ secrets.SERVER_SSH_KEY }}
      source: "publish/*"
      target: "/var/www/LMS-API/publish_new"

  - name: Deploy
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.SERVER_HOST }}
      username: ${{ secrets.SERVER_USER }}
      key: ${{ secrets.SERVER_SSH_KEY }}
      script: |
        sudo systemctl stop lms-api || true

        if [ -d /var/www/LMS-API/publish ]; then
          sudo mv /var/www/LMS-API/publish /var/www/LMS-API/publish_old_$(date +%Y%m%d_%H%M%S)
        fi

        sudo mkdir -p /var/www/LMS-API/publish

        sudo cp -R /var/www/LMS-API/publish_new/* /var/www/LMS-API/publish/

        sudo systemctl start lms-api

        sleep 5

        sudo systemctl status lms-api --no-pager
```
