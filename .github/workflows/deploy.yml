name: Deploy LMS API

on:
  push:
    branches:
      - master

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore LMS.API.csproj

      - name: Build
        run: dotnet build LMS.API.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish LMS.API.csproj -c Release -o ./publish --no-build

      - name: Verify publish files
        run: |
          echo "Publish output:"
          ls -la ./publish

          if [ ! -f "./publish/LMS.API.dll" ]; then
            echo "LMS.API.dll not found"
            exit 1
          fi

      - name: Stop LMS API service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 22
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            systemctl stop lms-api || true
            mkdir -p /var/www/LMS-API/publish

      - name: Copy published files
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 22
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "publish/*"
          target: "/var/www/LMS-API/publish"
          strip_components: 1
          rm: true

      - name: Start LMS API service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 22
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            systemctl daemon-reload
            systemctl restart lms-api

            sleep 8

            if ! systemctl is-active --quiet lms-api; then
              echo "LMS API failed to start"

              echo "===== SERVICE STATUS ====="
              systemctl status lms-api --no-pager || true

              echo "===== SERVICE LOGS ====="
              journalctl -u lms-api -n 100 --no-pager || true

              exit 1
            fi

            echo "LMS API deployment successful"
            systemctl status lms-api --no-pager
